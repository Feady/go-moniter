<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoMoniter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#d1d5db;min-height:100vh}
.header{background:#0a1118;border-bottom:1px solid #1e2d3d;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;color:#e5e7eb}
.header-right{display:flex;align-items:center;gap:12px}
.nav{display:flex;gap:2px;background:#111b24;border-radius:6px;padding:3px}
.nav button{background:transparent;color:#94a3b8;border:none;padding:7px 16px;cursor:pointer;border-radius:4px;font-size:12px;transition:all 0.2s}
.nav button:hover{color:#e2e8f0;background:rgba(255,255,255,0.04)}
.nav button.active{color:#fff;background:#1e3a5f}
.global-actions{display:flex;gap:6px}
.global-actions button{background:#1a2a3a;color:#94a3b8;border:1px solid #1e2d3d;padding:6px 12px;cursor:pointer;border-radius:4px;font-size:11px;transition:all 0.2s}
.global-actions button:hover{background:#1e3a5f;color:#e2e8f0}
.global-actions button.primary{color:#fff;background:#2563eb;border-color:#2563eb}
.global-actions button.danger{color:#f87171}
.global-actions select{background:#0a1118;color:#e2e8f0;border:1px solid #1e2d3d;padding:6px 8px;border-radius:4px;font-size:11px}
.main{padding:12px 16px 16px 16px;max-width:100%}
.page{display:none}
.page.active{display:block}
.chart-stack{display:flex;flex-direction:column;gap:6px}
.chart-panel{background:#111b24;border-radius:6px;border:1px solid #1e2d3d;padding:8px 12px 8px 12px}
.chart-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px}
.chart-header h3{font-size:13px;color:#e5e7eb;font-weight:500}
.chart-actions{display:flex;gap:4px;flex-wrap:wrap}
.chart-actions button{background:#1a2a3a;color:#94a3b8;border:1px solid #1e2d3d;padding:3px 8px;cursor:pointer;border-radius:3px;font-size:10px;transition:all 0.15s}
.chart-actions button:hover{background:#1e3a5f;color:#e2e8f0;border-color:#2a4a6f}
.chart-actions button.active-btn{color:#fff;background:#2563eb;border-color:#2563eb}
.chart-actions button.danger{color:#f87171}
.chart-wrapper{position:relative;height:260px;width:100%}
.chart-wrapper canvas{width:100%!important}
.section-title{font-size:13px;font-weight:600;color:#94a3b8;padding:4px 0 8px 0;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:#3b82f6;border-radius:2px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;font-weight:500;margin-bottom:3px;color:#94a3b8}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1px solid #1e2d3d;border-radius:4px;font-size:12px;background:#0a1118;color:#e2e8f0;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6}
.form-group textarea{min-height:70px;font-family:'Consolas','Courier New',monospace;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:8px 16px;cursor:pointer;border-radius:4px;font-size:12px;transition:all 0.2s;border:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;color:#3b82f6;border:1px solid #1e3a5f}
.btn-outline:hover{background:rgba(59,130,246,0.08)}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 10px;font-size:10px}
.chart-list-item{background:#0a1118;border:1px solid #1e2d3d;border-radius:5px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.chart-list-item .info{flex:1}
.chart-list-item h4{font-size:13px;color:#e5e7eb;margin-bottom:3px}
.chart-list-item .meta{font-size:10px;color:#64748b}
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#334155;transition:.3s;border-radius:22px}
.toggle-switch .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#64748b;transition:.3s;border-radius:50%}
.toggle-switch input:checked+.slider{background:#2563eb}
.toggle-switch input:checked+.slider:before{transform:translateX(18px);background:#fff}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#111b24;border-radius:8px;border:1px solid #1e2d3d;padding:20px;max-width:900px;width:94%;max-height:88vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-header h2{font-size:16px;color:#e5e7eb}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
.close-btn:hover{color:#e2e8f0}
.command-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.command-tile{background:#111b24;border:1px solid #1e2d3d;border-radius:6px;overflow:hidden}
.cmd-tile-header{background:#0a1118;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e2d3d}
.cmd-tile-header h4{font-size:12px;color:#e5e7eb}
.cmd-tile-body{padding:10px}
.cmd-tile-output{background:#0a1118;border:1px solid #1e2d3d;border-radius:4px;padding:10px;font-family:'Consolas','Courier New',monospace;font-size:11px;max-height:300px;overflow-y:auto;white-space:pre-wrap;color:#94a3b8;line-height:1.5;min-height:60px}
.history-controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.history-controls input,.history-controls select{padding:7px 10px;border:1px solid #1e2d3d;border-radius:4px;font-size:12px;background:#0a1118;color:#e2e8f0}
.history-controls input:focus,.history-controls select:focus{outline:none;border-color:#3b82f6}
.history-charts{display:flex;flex-direction:column;gap:8px}
.history-chart-panel{background:#111b24;border-radius:6px;border:1px solid #1e2d3d;padding:12px}
.history-chart-panel h3{font-size:13px;color:#e5e7eb;margin-bottom:8px}
.history-chart-wrapper{height:260px}
.annotation-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e3a5f;color:#fff;padding:10px 20px;border-radius:6px;z-index:2000;display:none;font-size:13px}
.annotation-toast input{padding:6px 10px;border:1px solid #2a4a6f;border-radius:3px;font-size:12px;background:#0a1118;color:#e2e8f0;margin-right:6px;width:200px}
.annotation-toast button{padding:6px 12px;background:#2563eb;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px}
.annotation-toast label{font-size:11px;margin-right:6px;display:inline-flex;align-items:center;gap:3px}
.ds-card{background:#0a1118;border:1px solid #1e2d3d;border-radius:6px;padding:12px;margin-bottom:8px}
.ds-card .ds-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;align-items:end}
.ds-card .ds-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ds-card .ds-head span{font-size:11px;color:#64748b}
.ds-card .ds-head button{background:none;border:none;color:#f87171;cursor:pointer;font-size:16px}
.ds-src-badge{font-size:10px;padding:2px 6px;border-radius:3px;margin-right:4px}
.ds-src-badge.system{background:rgba(37,99,235,0.15);color:#60a5fa}
.ds-src-badge.shell{background:rgba(34,197,94,0.15);color:#4ade80}
.ds-src-badge.tcp{background:rgba(245,158,11,0.15);color:#fbbf24}
.rule-help{font-size:10px;color:#64748b;margin-top:3px;line-height:1.5}
.rule-help code{background:#0a1118;padding:1px 4px;border-radius:2px;color:#60a5fa;border:1px solid #1e2d3d}
.status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px}
.status-dot.enabled{background:#22c55e}
.status-dot.disabled{background:#64748b}
.empty-state{padding:30px;text-align:center;color:#64748b}
.ann-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1e2d3d;font-size:12px}
.ann-item button{background:none;border:none;cursor:pointer;font-size:14px;color:#f87171;opacity:0.6}
.ann-item button:hover{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a1118}
::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3f55}
input[type=color]{width:36px;height:28px;padding:2px;border-radius:3px}
.time-range-bar{position:relative;height:32px;background:#0a1118;border:1px solid #1e2d3d;border-radius:4px;margin:6px 0;user-select:none;touch-action:none}
.time-range-bar .track-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:#111b24;border-radius:3px}
.time-range-bar .track-range{position:absolute;top:2px;bottom:2px;left:0;right:0;background:rgba(37,99,235,0.2);border-radius:2px}
.time-range-bar .handle{position:absolute;top:0;bottom:0;width:8px;background:#3b82f6;cursor:ew-resize;border-radius:2px;z-index:2}
.time-range-bar .handle:hover{background:#60a5fa}
</style>
</head>
<body>
<div class="header">
<h1>GoMoniter</h1>
<div class="header-right">
<div class="nav">
<button class="active" data-page="dashboard">仪表盘</button>
<button data-page="configs">配置</button>
<button data-page="commands">命令</button>
<button data-page="history">历史</button>
</div>
<div class="global-actions">
<select id="global-refresh" onchange="G.setRefresh(this.value)">
<option value="1">刷新: 1s</option>
<option value="2" selected>刷新: 2s</option>
<option value="3">刷新: 3s</option>
<option value="5">刷新: 5s</option>
<option value="10">刷新: 10s</option>
</select>
<button onclick="G.resetZoom()">🔍 重置</button>
<button class="primary" onclick="G.exportAll()">⬇ 导出全部</button>
<button class="danger" onclick="G.clearAll()">🗑 清空</button>
</div>
</div>
</div>

<div class="main">
<div id="dashboard" class="page active">
<div class="chart-stack" id="chart-stack"></div>
<div class="time-range-bar" id="time-range-slider">
<div class="track-bg"></div>
<div class="track-range" id="slider-track-range" style="left:0;right:0"></div>
<div class="handle" id="slider-left-handle" style="left:0"></div>
<div class="handle" id="slider-right-handle" style="right:0"></div>
</div>
<div style="display:flex;justify-content:space-between;margin-top:4px">
<span style="font-size:10px;color:#64748b">◀ 拖动滑块选时间范围 | 滚轮缩放 ▶</span>
<button onclick="G.autoFit()" class="btn btn-outline btn-sm" style="padding:2px 8px;font-size:10px">自适应</button>
</div>
</div>
<div id="configs" class="page">
<div class="section-title">图表配置</div>
<div id="config-list"></div>
<button class="btn btn-primary btn-sm" onclick="G.openEditor()" style="margin-top:8px">+ 添加图表</button>
</div>
<div id="commands" class="page">
<div class="section-title">命令按钮</div>
<div style="margin-bottom:12px;display:flex;gap:6px">
<button class="btn btn-primary btn-sm" onclick="G.openCmdEditor()">+ 添加命令</button>
<button class="btn btn-outline btn-sm" onclick="G.runAllCmds()">▶ 执行全部</button>
</div>
<div class="command-grid" id="command-tiles"></div>
</div>
<div id="history" class="page">
<div class="section-title">历史数据</div>
<div class="history-controls">
<span style="font-size:12px;color:#94a3b8">起:</span><input type="datetime-local" id="h-since">
<span style="font-size:12px;color:#94a3b8">止:</span><input type="datetime-local" id="h-until">
<button class="btn btn-primary btn-sm" onclick="G.loadHistory()">加载</button>
<button class="btn btn-outline btn-sm" onclick="G.exportHistory()">导出</button>
<button class="btn btn-danger btn-sm" onclick="G.clearHistory()">清理</button>
</div>
<div class="history-charts" id="history-charts"></div>
</div>
</div>

<div class="modal" id="chart-editor-modal"><div class="modal-content">
<div class="modal-header"><h2 id="editor-title">图表配置</h2><button class="close-btn" onclick="G.closeEditor()">&times;</button></div>
<div id="editor-content"></div>
</div></div>
<div class="modal" id="cmd-editor-modal"><div class="modal-content">
<div class="modal-header"><h2>命令配置</h2><button class="close-btn" onclick="G.closeCmdEditor()">&times;</button></div>
<div id="cmd-editor-content"></div>
</div></div>
<div class="modal" id="annotation-modal"><div class="modal-content">
<div class="modal-header"><h2>注释列表</h2><button class="close-btn" onclick="G.closeAnnModal()">&times;</button></div>
<div id="annotation-list"></div>
</div></div>
<div class="annotation-toast" id="annotation-toast">
<input type="text" id="ann-quick-text" placeholder="输入注释...">
<label><input type="checkbox" id="ann-quick-pinned"> 固定</label>
<button onclick="G.submitAnn()">确定</button>
<button onclick="G.hideAnn()" style="background:#334155;margin-left:4px">取消</button>
</div>

<script>
(function(){
var C=null,S={},RI=2000,RT=null,ACT=null,QCID=null,QTS=null;
var LXM=null,LXX=null,ZNG=false,SUP=false,DSD=[];
var CL=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16'];
function Q(s){return"'"+s+"'";}
var d=new Date();d.setHours(d.getHours()-1);
document.getElementById('h-since').value=d.toISOString().slice(0,16);
document.getElementById('h-until').value=(new Date()).toISOString().slice(0,16);

document.querySelectorAll('.nav button').forEach(function(b){
b.addEventListener('click',function(){
document.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('active');});
this.classList.add('active');
document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
document.getElementById(this.dataset.page).classList.add('active');
if(this.dataset.page==='commands')RCmd();
});
});

function api(u,o){o=o||{};return fetch(u,o).then(function(r){return r.json();});}
function saveCfg(){return api('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(C)});}

async function loadCfg(){C=await api('/api/config');RA();}
function RA(){RD();RCL();rcAR();}
function rcAR(){if(RT)clearInterval(RT);RT=setInterval(refAC,RI);}

G={};

G.setRefresh=function(v){RI=parseInt(v)*1000;rcAR();};

function RD(){
var s=document.getElementById('chart-stack');s.innerHTML='';
if(!C||!C.charts)return;
var en=C.charts.filter(function(c){return c.enabled;});
if(!en.length){s.innerHTML='<div class="empty-state">没有启用的图表</div>';return;}
en.forEach(function(ch){
var p=document.createElement('div');p.className='chart-panel';
var lb=ch.auto_refresh?'⏸':'▶',cs=ch.auto_refresh?'active-btn':'';
p.innerHTML='<div class="chart-header"><h3>'+ch.name+' <span style="font-size:10px;color:#64748b">['+ch.interval+'s采集]</span></h3>'+
'<div class="chart-actions">'+
'<button class="'+cs+'" onclick="G.toggleAR('+Q(ch.id)+')" id="pause-'+ch.id+'">'+lb+'</button>'+
'<button onclick="G.clearChart('+Q(ch.id)+')" class="danger">清理</button>'+
'<button onclick="G.openAnn('+Q(ch.id)+')">注释</button>'+
'</div></div><div class="chart-wrapper"><canvas id="chart-'+ch.id+'"></canvas></div>';
s.appendChild(p);
});
cAC();lAC();LXM=null;LXX=null;sRS();setTimeout(function(){G.autoFit();},500);
}

function myA(sr){
var ys=new Set(sr.map(function(d){return d.y_axis_id||'y';}));
var ax={},idx=0;
ys.forEach(function(id){
var sm=sr.filter(function(d){return(d.y_axis_id||'y')===id;});
var ym=sm.find(function(d){return d.y_min!=null&&d.y_min!==undefined;});
var yx=sm.find(function(d){return d.y_max!=null&&d.y_max!==undefined;});
ax[id]={type:'linear',display:true,position:idx%2===0?'left':'right',title:{display:true,text:'',color:'#94a3b8'},grid:{drawOnChartArea:idx===0,color:'#1e2d3d'},ticks:{color:'#94a3b8',font:{size:9}}};
if(ym&&ym.y_min!=null){ax[id].min=ym.y_min;}
if(yx&&yx.y_max!=null){ax[id].max=yx.y_max;}
if(idx>0)ax[id].grid={drawOnChartArea:false,color:'#1e2d3d'};
idx++;
});
return ax;
}

async function cAC(){if(!C||!C.charts)return;C.charts.forEach(function(ch){if(!ch.enabled)return;cChart(ch);});}
async function cChart(ch){
var cv=document.getElementById('chart-'+ch.id);if(!cv)return;
if(S[ch.id]){S[ch.id].destroy();S[ch.id]=null;}
var ya=myA(ch.data_sources);
var ds=ch.data_sources.map(function(d,i){return{label:d.name,data:[],borderColor:d.color||CL[i%CL.length],backgroundColor:d.color||CL[i%CL.length],fill:false,tension:0.2,pointRadius:1.5,pointHoverRadius:5,borderWidth:1.5,yAxisID:d.y_axis_id||'y'};});
S[ch.id]=new Chart(cv,{type:'line',data:{datasets:ds},options:{
responsive:true,maintainAspectRatio:false,animation:{duration:150},interaction:{mode:'nearest',axis:'x',intersect:false},
onClick:function(ev,el){if(el.length>0){var e=el[0],pt=this.data.datasets[e.datasetIndex].data[e.index];QCID=ch.id;QTS=Math.round(pt.x);var d=ch.data_sources[e.datasetIndex],us=d&&d.unit?' '+d.unit:'';document.getElementById('ann-quick-text').value=(d?d.name:'')+': '+pt.y.toFixed(2)+us;document.getElementById('annotation-toast').style.display='block';setTimeout(function(){document.getElementById('ann-quick-text').focus();},50);}},
plugins:{tooltip:{mode:'nearest',intersect:false,backgroundColor:'rgba(10,17,24,0.95)',titleColor:'#e5e7eb',bodyColor:'#d1d5db',borderColor:'#1e2d3d',borderWidth:1,callbacks:{label:function(cx){var d=ch.data_sources[cx.datasetIndex];var l=d?d.name:(cx.dataset.label||'');l+=': '+cx.parsed.y.toFixed(2);if(d&&d.unit)l+=' '+d.unit;return l;}}},legend:{position:'bottom',labels:{boxWidth:8,padding:12,font:{size:10},color:'#94a3b8',usePointStyle:true}},zoom:{zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x',onZoomComplete:function(cx){if(SUP)return;uSF(cx.chart);if(!ZNG)sAZ(cx.chart);}}},annotation:{annotations:{}}},scales:{x:{type:'time',time:{displayFormats:{second:'HH:mm:ss',minute:'HH:mm',hour:'MM-dd HH:mm'}},title:{display:false},ticks:{color:'#64748b',font:{size:9},maxTicksLimit:12},grid:{color:'#1e2d3d'}},...ya}}});
}

function sAZ(sc){if(ZNG||SUP)return;ZNG=true;var mn=sc.scales.x.min,mx=sc.scales.x.max;LXM=mn;LXX=mx;Object.keys(S).forEach(function(k){var c=S[k];if(!c||c===sc)return;c.options.scales.x.min=mn;c.options.scales.x.max=mx;c.update('none');});uSS(mn,mx);setTimeout(function(){ZNG=false;},100);}
function uSF(ch){var mn=ch.scales.x.min,mx=ch.scales.x.max;if(mn===undefined||mx===undefined)return;LXM=mn;LXX=mx;uSS(mn,mx);}
function uSS(mn,mx){var sl=document.getElementById('time-range-slider');if(!sl||!sl.dataset.tm||!sl.dataset.tx)return;var tm=parseInt(sl.dataset.tm),tx=parseInt(sl.dataset.tx);if(isNaN(tm)||isNaN(tx)||tm>=tx)return;var rg=tx-tm||1,lp=((mn-tm)/rg*100),rp=((mx-tm)/rg*100);var lh=document.getElementById('slider-left-handle'),rh=document.getElementById('slider-right-handle'),tr=document.getElementById('slider-track-range');if(lh)lh.style.left=Math.max(0,Math.min(100,lp))+'%';if(rh)rh.style.right=(100-Math.max(0,Math.min(100,rp)))+'%';if(tr){tr.style.left=Math.max(0,lp)+'%';tr.style.right=(100-Math.max(0,rp))+'%';}}
function sRS(){var sl=document.getElementById('time-range-slider');if(!sl)return;var dg=null,sx=0,sL=0,sR=0;function gX(e){return e.touches?e.touches[0].clientX:e.clientX;}function oD(e,h){dg=h;sx=gX(e);var lh=document.getElementById('slider-left-handle'),rh=document.getElementById('slider-right-handle');sL=parseFloat(lh.style.left)||0;sR=parseFloat(rh.style.right)||0;e.preventDefault();}document.getElementById('slider-left-handle').addEventListener('mousedown',function(e){oD(e,'left');});document.getElementById('slider-left-handle').addEventListener('touchstart',function(e){oD(e,'left');});document.getElementById('slider-right-handle').addEventListener('mousedown',function(e){oD(e,'right');});document.getElementById('slider-right-handle').addEventListener('touchstart',function(e){oD(e,'right');});document.addEventListener('mousemove',function(e){if(!dg)return;var dx=(gX(e)-sx)/sl.clientWidth*100;aD(dg,sL+dx,sR-dx);});document.addEventListener('touchmove',function(e){if(!dg)return;var dx=(gX(e)-sx)/sl.clientWidth*100;aD(dg,sL+dx,sR-dx);});document.addEventListener('mouseup',function(){dg=null;});document.addEventListener('touchend',function(){dg=null;});}
function aD(h,lp,rp){lp=Math.max(0,Math.min(100,lp));rp=Math.max(0,Math.min(100,rp));if(h==='left')lp=Math.min(lp,100-rp-2);else rp=Math.min(rp,100-lp-2);var lh=document.getElementById('slider-left-handle'),rh=document.getElementById('slider-right-handle'),tr=document.getElementById('slider-track-range');lh.style.left=lp+'%';rh.style.right=rp+'%';tr.style.left=lp+'%';tr.style.right=rp+'%';var sl=document.getElementById('time-range-slider'),tm=parseInt(sl.dataset.tm),tx=parseInt(sl.dataset.tx),rg=tx-tm||1;var nm=tm+rg*lp/100,nx=tm+rg*(100-rp)/100;LXM=nm;LXX=nx;SUP=true;Object.keys(S).forEach(function(k){var c=S[k];if(!c)return;c.options.scales.x.min=nm;c.options.scales.x.max=nx;c.update('none');});setTimeout(function(){SUP=false;},100);}
G.resetZoom=function(){LXM=null;LXX=null;var sl=document.getElementById('time-range-slider');if(sl){document.getElementById('slider-left-handle').style.left='0%';document.getElementById('slider-right-handle').style.right='0%';document.getElementById('slider-track-range').style.left='0%';document.getElementById('slider-track-range').style.right='0%';}Object.keys(S).forEach(function(k){var c=S[k];if(!c)return;c.resetZoom();c.options.scales.x.min=undefined;c.options.scales.x.max=undefined;});setTimeout(iSR,200);};
function iSR(){var ks=Object.keys(S);if(!ks.length)return;var c=S[ks[0]];if(!c||!c.data||!c.data.datasets||!c.data.datasets.length)return;var al=[];c.data.datasets.forEach(function(ds){if(ds&&ds.data&&ds.data.length)ds.data.forEach(function(p){if(p&&p.x!=null&&p.x!==undefined&&isFinite(p.x))al.push(p.x);});});if(!al.length)return;var tm=Math.min.apply(null,al),tx=Math.max.apply(null,al),mg=(tx-tm)*0.05||60000;var sl=document.getElementById('time-range-slider');sl.dataset.tm=tm-mg;sl.dataset.tx=tx+mg;document.getElementById('slider-left-handle').style.left='0%';document.getElementById('slider-right-handle').style.right='0%';document.getElementById('slider-track-range').style.left='0%';document.getElementById('slider-track-range').style.right='0%';LXM=null;LXX=null;}
G.autoFit=function(){var ks=Object.keys(S);if(!ks.length)return;var c=S[ks[0]];if(!c||!c.data||!c.data.datasets.length)return;var al=[];c.data.datasets.forEach(function(ds){if(ds&&ds.data&&ds.data.length)ds.data.forEach(function(p){if(p&&p.x!=null&&p.x!==undefined&&isFinite(p.x))al.push(p.x);});});if(!al.length)return;var tm=Math.min.apply(null,al),tx=Math.max.apply(null,al),mg=(tx-tm)*0.05||60000;var sl=document.getElementById('time-range-slider');sl.dataset.tm=tm-mg;sl.dataset.tx=tx+mg;document.getElementById('slider-left-handle').style.left='0%';document.getElementById('slider-right-handle').style.right='0%';document.getElementById('slider-track-range').style.left='0%';document.getElementById('slider-track-range').style.right='0%';SUP=true;Object.keys(S).forEach(function(k){var cc=S[k];if(!cc)return;cc.options.scales.x.min=undefined;cc.options.scales.x.max=undefined;cc.resetZoom();cc.update('none');});LXM=null;LXX=null;setTimeout(function(){SUP=false;},150);};

G.delCmd=async function(id){C.command_buttons=C.command_buttons.filter(function(b){return b.id!==id;});await saveCfg();RCmd();};
G.editCmd=function(id){G.openCmdEditor(id);};

G.loadHistory=async function(){var sn=new Date(document.getElementById('h-since').value).getTime(),un=new Date(document.getElementById('h-until').value).getTime(),c=document.getElementById('history-charts');if(!C||!C.charts){c.innerHTML='<div class="empty-state">无图表配置</div>';return;}var en=C.charts.filter(function(x){return x.enabled;});if(!en.length){c.innerHTML='<div class="empty-state">没有启用的图表</div>';return;}c.innerHTML='<div class="empty-state">加载中...</div>';var h='';for(var i=0;i<en.length;i++){h+='<div class="history-chart-panel"><h3>'+en[i].name+'</h3><div class="history-chart-wrapper"><canvas id="hchart-'+en[i].id+'"></canvas></div></div>';}c.innerHTML=h;for(var i=0;i<en.length;i++){var ps=await api('/api/history?chart_id='+en[i].id+'&since='+(sn||0)+'&until='+(un||Date.now()));setTimeout(function(ch,ps){mHC(ch,ps);},50,en[i],ps);}};
function mHC(ch,ps){var cv=document.getElementById('hchart-'+ch.id);if(!cv||!ps||!ps.length)return;var ya=myA(ch.data_sources);var ds=ch.data_sources.map(function(d,i){return{label:d.name,data:[],borderColor:d.color||CL[i%CL.length],backgroundColor:d.color||CL[i%CL.length],fill:false,tension:0.2,pointRadius:1,yAxisID:d.y_axis_id||'y'};});ch.data_sources.forEach(function(d,i){var data=[];ps.forEach(function(p){var v=p.values[d.name];if(v!==undefined)data.push({x:p.timestamp,y:v});});ds[i].data=data;});new Chart(cv,{type:'line',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{tooltip:{mode:'nearest',intersect:false},legend:{position:'bottom',labels:{boxWidth:8,font:{size:10},color:'#94a3b8'}}},scales:{x:{type:'time',time:{displayFormats:{minute:'HH:mm',hour:'MM-dd HH:mm'}},ticks:{color:'#64748b',font:{size:9},maxTicksLimit:12},grid:{color:'#1e2d3d'}},...ya}}});}
G.exportHistory=function(){window.open('/api/export/all','_blank');};
G.clearHistory=async function(){if(!C||!C.charts)return;if(!confirm('确定清理所有历史数据？此操作不可撤销。'))return;await api('/api/history/clear',{method:'DELETE'});G.loadHistory();};

loadCfg();
})();
</script>
