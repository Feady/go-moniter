<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoMoniter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#d1d5db;min-height:100vh}
.header{background:#0a1118;border-bottom:1px solid #1e2d3d;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;color:#e5e7eb}
.header-right{display:flex;align-items:center;gap:12px}
.nav{display:flex;gap:2px;background:#111b24;border-radius:6px;padding:3px}
.nav button{background:transparent;color:#94a3b8;border:none;padding:7px 16px;cursor:pointer;border-radius:4px;font-size:12px;transition:all 0.2s}
.nav button:hover{color:#e2e8f0;background:rgba(255,255,255,0.04)}
.nav button.active{color:#fff;background:#1e3a5f}
.global-actions{display:flex;gap:6px}
.global-actions button{background:#1a2a3a;color:#94a3b8;border:1px solid #1e2d3d;padding:6px 12px;cursor:pointer;border-radius:4px;font-size:11px;transition:all 0.2s}
.global-actions button:hover{background:#1e3a5f;color:#e2e8f0}
.global-actions button.primary{color:#fff;background:#2563eb;border-color:#2563eb}
.global-actions button.danger{color:#f87171}
.global-actions select{background:#0a1118;color:#e2e8f0;border:1px solid #1e2d3d;padding:6px 8px;border-radius:4px;font-size:11px}
.main{padding:12px 16px 16px 16px;max-width:100%}
.page{display:none}
.page.active{display:block}
.dashboard-scroll{overflow-y:auto;max-height:calc(100vh - 120px)}
.chart-stack{display:flex;flex-direction:column;gap:6px}
.chart-panel{background:#111b24;border-radius:6px;border:1px solid #1e2d3d;padding:8px 12px 8px 12px}
.chart-panel.x-hidden .chart-header{border-radius:6px 6px 0 0}
.chart-panel.x-visible .chart-header{border-bottom:1px solid #1e2d3d;margin-bottom:4px}
.chart-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px}
.chart-header h3{font-size:13px;color:#e5e7eb;font-weight:500}
.chart-meta{display:flex;align-items:center;gap:12px}
.chart-meta span{font-size:10px;color:#64748b}
.chart-actions{display:flex;gap:4px;flex-wrap:wrap}
.chart-actions button{background:#1a2a3a;color:#94a3b8;border:1px solid #1e2d3d;padding:3px 8px;cursor:pointer;border-radius:3px;font-size:10px;transition:all 0.15s}
.chart-actions button:hover{background:#1e3a5f;color:#e2e8f0;border-color:#2a4a6f}
.chart-actions button.active-btn{color:#fff;background:#2563eb;border-color:#2563eb}
.chart-actions button.danger{color:#f87171}
.chart-actions button.danger:hover{background:rgba(248,113,113,0.1)}
.chart-wrapper{position:relative;height:260px;width:100%}
.chart-wrapper canvas{width:100%!important}
.section-title{font-size:13px;font-weight:600;color:#94a3b8;padding:4px 0 8px 0;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:#3b82f6;border-radius:2px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:500;margin-bottom:3px;color:#94a3b8}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1px solid #1e2d3d;border-radius:4px;font-size:12px;background:#0a1118;color:#e2e8f0;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6}
.form-group textarea{min-height:70px;font-family:'Consolas','Courier New',monospace;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
.datasource-item{background:#0a1118;border:1px solid #1e2d3d;border-radius:5px;padding:10px;margin-bottom:6px}
.btn{padding:8px 16px;cursor:pointer;border-radius:4px;font-size:12px;transition:all 0.2s;border:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;color:#3b82f6;border:1px solid #1e3a5f}
.btn-outline:hover{background:rgba(59,130,246,0.08)}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 10px;font-size:10px}
.chart-list-item{background:#0a1118;border:1px solid #1e2d3d;border-radius:5px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.chart-list-item .info{flex:1}
.chart-list-item h4{font-size:13px;color:#e5e7eb;margin-bottom:3px}
.chart-list-item .meta{font-size:10px;color:#64748b}
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#334155;transition:.3s;border-radius:22px}
.toggle-switch .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#64748b;transition:.3s;border-radius:50%}
.toggle-switch input:checked+.slider{background:#2563eb}
.toggle-switch input:checked+.slider:before{transform:translateX(18px);background:#fff}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#111b24;border-radius:8px;border:1px solid #1e2d3d;padding:20px;max-width:740px;width:94%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-header h2{font-size:16px;color:#e5e7eb}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
.close-btn:hover{color:#e2e8f0}
.command-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.command-tile{background:#111b24;border:1px solid #1e2d3d;border-radius:6px;overflow:hidden}
.cmd-tile-header{background:#0a1118;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e2d3d}
.cmd-tile-header h4{font-size:12px;color:#e5e7eb}
.cmd-tile-body{padding:10px}
.cmd-tile-output{background:#0a1118;border:1px solid #1e2d3d;border-radius:4px;padding:10px;font-family:'Consolas','Courier New',monospace;font-size:11px;max-height:300px;overflow-y:auto;white-space:pre-wrap;color:#94a3b8;line-height:1.5;min-height:60px}
.history-controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.history-controls input,.history-controls select{padding:7px 10px;border:1px solid #1e2d3d;border-radius:4px;font-size:12px;background:#0a1118;color:#e2e8f0}
.history-controls input:focus,.history-controls select:focus{outline:none;border-color:#3b82f6}
.history-charts{display:flex;flex-direction:column;gap:8px}
.history-chart-panel{background:#111b24;border-radius:6px;border:1px solid #1e2d3d;padding:12px}
.history-chart-panel h3{font-size:13px;color:#e5e7eb;margin-bottom:8px}
.history-chart-wrapper{height:260px}
.annotation-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e3a5f;color:#fff;padding:10px 20px;border-radius:6px;z-index:2000;display:none;font-size:13px}
.annotation-toast input{padding:6px 10px;border:1px solid #2a4a6f;border-radius:3px;font-size:12px;background:#0a1118;color:#e2e8f0;margin-right:6px;width:200px}
.annotation-toast button{padding:6px 12px;background:#2563eb;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px}
.annotation-toast label{font-size:11px;margin-right:6px;display:inline-flex;align-items:center;gap:3px}
.rule-help{font-size:10px;color:#64748b;margin-top:3px;line-height:1.5}
.rule-help code{background:#0a1118;padding:1px 4px;border-radius:2px;color:#60a5fa;border:1px solid #1e2d3d}
.status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px}
.status-dot.enabled{background:#22c55e}
.status-dot.disabled{background:#64748b}
.empty-state{padding:30px;text-align:center;color:#64748b}
.ann-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1e2d3d;font-size:12px}
.ann-item button{background:none;border:none;cursor:pointer;font-size:14px;color:#f87171;opacity:0.6}
.ann-item button:hover{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a1118}
::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3f55}
input[type="color"]{width:36px;height:28px;padding:2px;border-radius:3px}
.time-range-bar{position:relative;height:32px;background:#0a1118;border:1px solid #1e2d3d;border-radius:4px;margin:6px 0;cursor:default;user-select:none;touch-action:none}
.time-range-bar .track-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:#111b24;border-radius:3px}
.time-range-bar .track-range{position:absolute;top:2px;bottom:2px;left:0;right:0;background:rgba(37,99,235,0.2);border-radius:2px}
.time-range-bar .handle{position:absolute;top:0;bottom:0;width:8px;background:#3b82f6;cursor:ew-resize;border-radius:2px;z-index:2}
.time-range-bar .handle:hover{background:#60a5fa}
.time-range-bar .lbl{position:absolute;top:36px;font-size:9px;color:#64748b;transform:translateX(-50%);white-space:nowrap}

</style>
</head>
<body>
<div class="header">
<h1>GoMoniter</h1>
<div class="header-right">
<div class="nav">
<button class="active" data-page="dashboard">仪表盘</button>
<button data-page="configs">配置</button>
<button data-page="commands">命令</button>
<button data-page="history">历史</button>
</div>
<div class="global-actions">
<select id="global-refresh" onchange="setGlobalRefresh(this.value)">
<option value="1">刷新: 1s</option>
<option value="2" selected>刷新: 2s</option>
<option value="3">刷新: 3s</option>
<option value="5">刷新: 5s</option>
<option value="10">刷新: 10s</option>
</select>
<button onclick="resetAllZoom()" title="重置缩放">🔍</button>
<button class="primary" onclick="exportAllCharts()">⬇ 导出全部</button>
<button class="danger" onclick="clearAllData()">🗑 清空显示</button>
</div>
</div>
</div>

<div class="main">
<div id="dashboard" class="page active">
<div class="dashboard-scroll"><div class="chart-stack" id="chart-stack"></div>
<div class="time-range-bar" id="time-range-slider" data-total-min="0" data-total-max="1">
<div class="track-bg"></div>
<div class="track-range" id="slider-track-range" style="left:0;right:0"></div>
<div class="handle" id="slider-left-handle" style="left:0"></div>
<div class="handle" id="slider-right-handle" style="right:0"></div>
</div>
<div style="display:flex;justify-content:space-between;margin-top:4px">
<span style="font-size:10px;color:#64748b">◀ 拖动滑块选择时间范围 | 滚轮缩放 ▶</span>
<button onclick="autoFitTimeline()" class="btn btn-outline btn-sm" style="padding:2px 8px;font-size:10px">自适应</button>
</div>
</div>
</div>
<div id="configs" class="page">
<div class="section-title">图表配置</div>
<div id="config-list"></div>
<button class="btn btn-primary btn-sm" onclick="openChartEditor()" style="margin-top:8px">+ 添加图表</button>
</div>
<div id="commands" class="page">
<div class="section-title">命令按钮</div>
<div style="margin-bottom:12px;display:flex;gap:6px">
<button class="btn btn-primary btn-sm" onclick="openCmdEditor()">+ 添加命令</button>
<button class="btn btn-outline btn-sm" onclick="runAllCommands()">▶ 执行全部</button>
</div>
<div class="command-grid" id="command-tiles"></div>
</div>
<div id="history" class="page">
<div class="section-title">历史数据</div>
<div class="history-controls">
<span style="font-size:12px;color:#94a3b8">起:</span><input type="datetime-local" id="h-since">
<span style="font-size:12px;color:#94a3b8">止:</span><input type="datetime-local" id="h-until">
<button class="btn btn-primary btn-sm" onclick="loadHistoryView()">加载</button>
<button class="btn btn-outline btn-sm" onclick="exportHistoryView()">导出</button>
<button class="btn btn-danger btn-sm" onclick="clearHistory()">清理</button>
</div>
<div class="history-charts" id="history-charts"></div>
</div>
</div>

<div class="modal" id="chart-editor-modal"><div class="modal-content">
<div class="modal-header"><h2 id="editor-title">图表配置</h2><button class="close-btn" onclick="closeEditor()">&times;</button></div>
<div id="editor-content"></div>
</div></div>

<div class="modal" id="cmd-editor-modal"><div class="modal-content">
<div class="modal-header"><h2>命令配置</h2><button class="close-btn" onclick="document.getElementById('cmd-editor-modal').classList.remove('active')">&times;</button></div>
<div id="cmd-editor-content"></div>
</div></div>

<div class="modal" id="annotation-modal"><div class="modal-content">
<div class="modal-header"><h2>注释列表</h2><button class="close-btn" onclick="closeAnnotationModal()">&times;</button></div>
<div id="annotation-list"></div>
</div></div>

<div class="annotation-toast" id="annotation-toast">
<input type="text" id="ann-quick-text" placeholder="输入注释...">
<label><input type="checkbox" id="ann-quick-pinned">固定</label>
<button onclick="submitQuickAnnotation()">确定</button>
<button onclick="hideAnnotationToast()" style="background:#334155;margin-left:4px">取消</button>
</div>

<script>
let config = null;
let charts = {};
let globalRefreshInterval = 2000;
let autoRefreshTimer = null;
let editingChartId = null;
let annotationChartId = null;
let quickAnnChartId = null;
let quickAnnTimestamp = null;
let zoomState = {};
let lastXMin = null;
let lastXMax = null;
let isZooming = false;
let sliderUpdating = false;

const colors = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16'];

Chart.register({id:'verticalLine',afterDraw:function(chart){}});

function getDefaultSince() {
const d = new Date(); d.setHours(d.getHours()-1);
return d.toISOString().slice(0,16);
}
function getDefaultUntil() {
return new Date().toISOString().slice(0,16);
}
document.getElementById('h-since').value = getDefaultSince();
document.getElementById('h-until').value = getDefaultUntil();

document.querySelectorAll('.nav button').forEach(btn => {
btn.addEventListener('click', function() {
document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
this.classList.add('active');
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById(this.dataset.page).classList.add('active');
if(this.dataset.page==='history') refreshHistorySelects();
if(this.dataset.page==='commands') renderCommandTiles();
});
});

function setGlobalRefresh(val) {
globalRefreshInterval = parseInt(val)*1000;
reconfigureAutoRefresh();
}

function reconfigureAutoRefresh() {
if(autoRefreshTimer) clearInterval(autoRefreshTimer);
autoRefreshTimer = setInterval(refreshActiveCharts, globalRefreshInterval);
}

async function api(url, opts={}) {
const res = await fetch(url, opts);
return res.json();
}

async function loadConfig() {
config = await api('/api/config');
renderAll();
}

function renderAll() {
renderDashboard();
renderConfigList();
reconfigureAutoRefresh();
}

function renderDashboard() {
const stack = document.getElementById('chart-stack');
stack.innerHTML = '';
if(!config||!config.charts) return;
const enabled = config.charts.filter(c => c.enabled);
if(!enabled.length){ stack.innerHTML='<div class="empty-state">没有启用的图表</div>'; return; }

let firstVisible = true;
enabled.forEach((chart, idx) => {
const panel = document.createElement('div');
panel.className = 'chart-panel ' + (idx===enabled.length-1 ? 'x-visible' : 'x-hidden');
const pauseLabel = chart.auto_refresh ? '⏸' : '▶';
const pauseCls = chart.auto_refresh ? 'active-btn' : '';
panel.innerHTML =
'<div class="chart-header">'+
'<h3>'+chart.name+' <span style="font-size:10px;color:#64748b">['+chart.interval+'s采集]</span></h3>'+
'<div class="chart-actions">'+
'<button class="'+pauseCls+'" onclick="toggleAutoRefresh(\''+chart.id+'\')" id="pause-'+chart.id+'">'+pauseLabel+'</button>'+
'<button onclick="clearChartData(\''+chart.id+'\')" class="danger">清理</button>'+
'<button onclick="openAnnotations(\''+chart.id+'\')">注释</button>'+
'</div></div>'+
'<div class="chart-wrapper"><canvas id="chart-'+chart.id+'"></canvas></div>';
stack.appendChild(panel);
});
createAllCharts();
loadAllChartData();
lastXMin = null; lastXMax = null;
setupRangeSlider();
setTimeout(autoFitTimeline, 500);
}

async function createAllCharts() {
if(!config||!config.charts) return;
for(const chart of config.charts) {
if(!chart.enabled) continue;
await createChart(chart);
}
}

function makeYAxes(sources) {
const ySet = new Set(sources.map(ds => ds.y_axis_id||'y'));
const axes = {};
let i = 0;
ySet.forEach(id => {
axes[id] = {
type:'linear', display:true,
position: i%2===0?'left':'right',
title:{display:true,text:'',color:'#94a3b8'},
grid:{drawOnChartArea:i===0,color:'#1e2d3d'},
ticks:{color:'#94a3b8',font:{size:9}}
};
i++;
});
return axes;
}

async function createChart(chart) {
const canvas = document.getElementById('chart-'+chart.id);
if(!canvas) return;
if(charts[chart.id]){ charts[chart.id].destroy(); charts[chart.id]=null; }

const yAxes = makeYAxes(chart.data_sources);
const datasets = chart.data_sources.map((ds,i) => ({
label:ds.name, data:[], borderColor:ds.color||colors[i%colors.length],
backgroundColor:ds.color||colors[i%colors.length], fill:false,
tension:0.2, pointRadius:1.5, pointHoverRadius:5, borderWidth:1.5,
yAxisID:ds.y_axis_id||'y'
}));

const chartOptions = {
responsive:true, maintainAspectRatio:false,
animation:{duration:150},
interaction:{mode:'nearest',axis:'x',intersect:false},
onClick: function(evt, elements) {
if(elements.length>0) {
const el = elements[0];
const pt = this.data.datasets[el.datasetIndex].data[el.index];
const ts = pt.x;
const dsName = this.data.datasets[el.datasetIndex].label;
const dsVal = pt.y;
quickAnnChartId = chart.id;
quickAnnTimestamp = Math.round(ts);
const u = chart.data_sources[el.datasetIndex];
const uStr = u&&u.unit ? ' '+u.unit : '';
document.getElementById('ann-quick-text').value = dsName+': '+dsVal.toFixed(2)+uStr;
document.getElementById('annotation-toast').style.display='block';
setTimeout(()=>document.getElementById('ann-quick-text').focus(),50);
}
},
plugins:{
tooltip:{
mode:'nearest',intersect:false,
backgroundColor:'rgba(10,17,24,0.95)',titleColor:'#e5e7eb',bodyColor:'#d1d5db',
borderColor:'#1e2d3d',borderWidth:1,
callbacks:{
label:function(ctx){
const ds = chart.data_sources[ctx.datasetIndex];
let l = ds ? ds.name : (ctx.dataset.label||'');
l += ': '+ctx.parsed.y.toFixed(2);
if(ds&&ds.unit) l += ' '+ds.unit;
return l;
}
}
},
legend:{position:'bottom',labels:{boxWidth:8,padding:12,font:{size:10},color:'#94a3b8',usePointStyle:true}},
zoom:{
zoom:{
wheel:{enabled:true}, pinch:{enabled:true},
mode:'x',
onZoomComplete:function(ctx){
if(sliderUpdating) return;
updateSliderFromChart(ctx.chart);
if(!isZooming) syncAllChartsZoom(ctx.chart);
}
}
},
},
scales:{
x:{type:'time',time:{displayFormats:{second:'HH:mm:ss',minute:'HH:mm',hour:'MM-dd HH:mm'}},
title:{display:false}, ticks:{color:'#64748b',font:{size:9},maxTicksLimit:12}, grid:{color:'#1e2d3d'}},
...yAxes
}
};

charts[chart.id] = new Chart(canvas, {type:'line',data:{datasets},options:chartOptions});
}

function syncAllChartsZoom(sourceChart) {
if(isZooming||sliderUpdating) return;
isZooming = true;
const smin = sourceChart.scales.x.min;
const smax = sourceChart.scales.x.max;
lastXMin = smin; lastXMax = smax;
Object.keys(charts).forEach(k => {
const c = charts[k];
if(!c||c===sourceChart) return;
c.options.scales.x.min = smin;
c.options.scales.x.max = smax;
c.update('none');
});
updateSliderFromSource(smin, smax);
setTimeout(()=>{isZooming=false;},100);
}

function updateSliderFromChart(chart) {
const smin = chart.scales.x.min;
const smax = chart.scales.x.max;
if(smin===undefined||smax===undefined) return;
lastXMin = smin; lastXMax = smax;
updateSliderFromSource(smin, smax);
}

function updateSliderFromSource(smin, smax) {
const slider = document.getElementById('time-range-slider');
if(!slider||!slider.dataset.totalMin||!slider.dataset.totalMax) return;
const tMin = parseInt(slider.dataset.totalMin);
const tMax = parseInt(slider.dataset.totalMax);
if(isNaN(tMin)||isNaN(tMax)||tMin>=tMax) return;
const range = tMax - tMin || 1;
const left = ((smin - tMin) / range * 100);
const right = ((smax - tMin) / range * 100);
const lh = document.getElementById('slider-left-handle');
const rh = document.getElementById('slider-right-handle');
const tr = document.getElementById('slider-track-range');
if(lh) lh.style.left = Math.max(0, Math.min(100, left))+'%';
if(rh) rh.style.right = (100 - Math.max(0, Math.min(100, right)))+'%';
if(tr){ tr.style.left = Math.max(0,left)+'%'; tr.style.right = (100-Math.max(0,right))+'%'; }
if(slider.dataset.leftPct !== undefined) slider.dataset.leftPct = left;
if(slider.dataset.rightPct !== undefined) slider.dataset.rightPct = right;
}

function setupRangeSlider() {
const slider = document.getElementById('time-range-slider');
if(!slider) return;
let dragging = null;
let startX = 0, startLeft = 0, startRight = 0;

function getClientX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

function onDown(e, handle) {
dragging = handle;
startX = getClientX(e);
const lh = document.getElementById('slider-left-handle');
const rh = document.getElementById('slider-right-handle');
startLeft = parseFloat(lh.style.left) || 0;
startRight = parseFloat(rh.style.right) || 0;
e.preventDefault();
}

document.getElementById('slider-left-handle').addEventListener('mousedown', e => onDown(e, 'left'));
document.getElementById('slider-left-handle').addEventListener('touchstart', e => onDown(e, 'left'));
document.getElementById('slider-right-handle').addEventListener('mousedown', e => onDown(e, 'right'));
document.getElementById('slider-right-handle').addEventListener('touchstart', e => onDown(e, 'right'));

document.addEventListener('mousemove', function(e) {
if(!dragging) return;
const dx = (getClientX(e) - startX) / slider.clientWidth * 100;
applySliderDrag(dragging, startLeft + dx, startRight - dx);
});
document.addEventListener('touchmove', function(e) {
if(!dragging) return;
const dx = (getClientX(e) - startX) / slider.clientWidth * 100;
applySliderDrag(dragging, startLeft + dx, startRight - dx);
});
document.addEventListener('mouseup', ()=>{ dragging = null; });
document.addEventListener('touchend', ()=>{ dragging = null; });
}

function applySliderDrag(handle, leftPct, rightPct) {
leftPct = Math.max(0, Math.min(100, leftPct));
rightPct = Math.max(0, Math.min(100, rightPct));
if(handle==='left') leftPct = Math.min(leftPct, 100-rightPct-2);
else rightPct = Math.min(rightPct, 100-leftPct-2);

const lh = document.getElementById('slider-left-handle');
const rh = document.getElementById('slider-right-handle');
const tr = document.getElementById('slider-track-range');
lh.style.left = leftPct+'%'; rh.style.right = rightPct+'%';
tr.style.left = leftPct+'%'; tr.style.right = rightPct+'%';

const slider = document.getElementById('time-range-slider');
const tMin = parseInt(slider.dataset.totalMin);
const tMax = parseInt(slider.dataset.totalMax);
const range = tMax - tMin || 1;
const newMin = tMin + range * leftPct / 100;
const newMax = tMin + range * (100 - rightPct) / 100;
lastXMin = newMin; lastXMax = newMax;

sliderUpdating = true;
Object.keys(charts).forEach(k => {
const c = charts[k];
if(!c) return;
c.options.scales.x.min = newMin;
c.options.scales.x.max = newMax;
c.update('none');
});
setTimeout(()=>{sliderUpdating=false;},100);
}

function resetAllZoom() {
lastXMin=null;lastXMax=null;
const slider = document.getElementById('time-range-slider');
if(slider) {
const lh = document.getElementById('slider-left-handle');
const rh = document.getElementById('slider-right-handle');
const tr = document.getElementById('slider-track-range');
lh.style.left = '0%'; rh.style.right = '0%';
tr.style.left = '0%'; tr.style.right = '0%';
}
Object.keys(charts).forEach(k => {
const c = charts[k];
if(!c) return;
c.resetZoom();
c.options.scales.x.min = undefined;
c.options.scales.x.max = undefined;
});
setTimeout(initSliderFromCharts, 200);
}

function initSliderFromCharts() {
const cids = Object.keys(charts);
if(!cids.length) return;
const c = charts[cids[0]];
if(!c || !c.data || !c.data.datasets || !c.data.datasets.length) return;
const allPoints = [];
c.data.datasets.forEach(ds => {
if(ds && ds.data && ds.data.length) {
ds.data.forEach(p => { if(p&&p.x!==undefined&&Number.isFinite(p.x)) allPoints.push(p.x); });
}
});
if(!allPoints.length) return;
const tMin = Math.min(...allPoints);
const tMax = Math.max(...allPoints);
const margin = (tMax - tMin) * 0.05 || 60000;
const totalMin = tMin - margin;
const totalMax = tMax + margin;
const slider = document.getElementById('time-range-slider');
slider.dataset.totalMin = totalMin;
slider.dataset.totalMax = totalMax;
const lh = document.getElementById('slider-left-handle');
const rh = document.getElementById('slider-right-handle');
const tr = document.getElementById('slider-track-range');
lh.style.left = '0%'; rh.style.right = '0%';
tr.style.left = '0%'; tr.style.right = '0%';
lastXMin = null; lastXMax = null;
}

function autoFitTimeline() {
const cids = Object.keys(charts);
if(!cids.length) return;
const c = charts[cids[0]];
if(!c || !c.data || !c.data.datasets.length) return;
const allPoints = [];
c.data.datasets.forEach(ds => {
if(ds && ds.data && ds.data.length) {
ds.data.forEach(p => { if(p&&p.x!==undefined&&Number.isFinite(p.x)) allPoints.push(p.x); });
}
});
if(!allPoints.length) return;
const tMin = Math.min(...allPoints);
const tMax = Math.max(...allPoints);
const margin = (tMax - tMin) * 0.05 || 60000;
const slider = document.getElementById('time-range-slider');
slider.dataset.totalMin = tMin - margin;
slider.dataset.totalMax = tMax + margin;
const lh = document.getElementById('slider-left-handle');
const rh = document.getElementById('slider-right-handle');
const tr = document.getElementById('slider-track-range');
lh.style.left = '0%'; rh.style.right = '0%';

sliderUpdating = true;
Object.keys(charts).forEach(k => {
const cc = charts[k];
if(!cc) return;
cc.options.scales.x.min = undefined;
cc.options.scales.x.max = undefined;
cc.resetZoom();
cc.update('none');

lastXMin=null; lastXMax=null;

async function loadChartData(chartId) {
const c = charts[chartId];
if(!c) return;
const points = await api('/api/data?chart_id='+chartId+'&limit=600');
if(!points||!points.length) return;
const chart = config.charts.find(ch => ch.id===chartId);
if(!chart) return;
chart.data_sources.forEach((ds,i) => {
if(i>=c.data.datasets.length) return;
const data = [];
points.forEach(p => {
const v = p.values[ds.name];
if(v!==undefined) data.push({x:p.timestamp,y:v});
});
c.data.datasets[i].data = data;
});
c.update('none');
await loadAnnotationsAnno(chartId);
}

async function loadAnnotationsAnno(chartId) {
	const c = charts[chartId];
	if(!c) return;
	const anns = await api('/api/annotations?chart_id='+chartId);
	if(!anns || !anns.length) {
		if(c.options.plugins && c.options.plugins.annotation) {
			c.options.plugins.annotation.annotations = {};
		}
		c.update('none');
		return;
	}
	if(!c.options.plugins) c.options.plugins = {};
	if(!c.options.plugins.annotation) c.options.plugins.annotation = {};
	const annObj = {};
	anns.forEach((ann, i) => {
		annObj['ann'+i] = {
			type: 'line',
			xScaleID: 'x',
			xMin: ann.timestamp,
			xMax: ann.timestamp,
			borderColor: ann.pinned ? '#f59e0b' : '#ef4444',
			borderWidth: ann.pinned ? 2 : 1,
			borderDash: ann.pinned ? [] : [4,2],
			label: {
				display: true,
				content: ann.text,
				position: 'start',
				backgroundColor: ann.pinned ? 'rgba(245,158,11,0.85)' : 'rgba(239,68,68,0.75)',
				color: '#fff',
				font: {size: 10}
			}
		};
	});
	c.options.plugins.annotation.annotations = annObj;
	c.update('none');
}

let html='';
config.command_buttons.forEach(btn=>{
const dt=btn.display_type||'output';
html+='<div class="command-tile"><div class="cmd-tile-header">'+
'<h4>'+btn.label+'</h4><div style="display:flex;gap:4px">'+
(dt==='text'?'<span style="font-size:9px;color:#64748b">文本</span>':'<span style="font-size:9px;color:#64748b">输出</span>')+
'<button onclick="runCmdBtn(\''+btn.id+'\')" class="btn btn-primary btn-sm" style="padding:2px 6px">执行</button>'+
'<button onclick="editCmdBtn(\''+btn.id+'\')" class="btn btn-outline btn-sm" style="padding:2px 6px">编辑</button>'+
'<button onclick="deleteCmdBtn(\''+btn.id+'\')" class="btn btn-danger btn-sm" style="padding:2px 6px">&times;</button></div></div>'+
'<div class="cmd-tile-body"><div class="cmd-tile-output" id="cmd-out-'+btn.id+'">等待执行...</div></div></div>';
});
container.innerHTML=html;
config.command_buttons.forEach(btn=>{
if(btn.auto_refresh>0){
setInterval(()=>runCmdBtn(btn.id),btn.auto_refresh*1000);
}
});
}

async function runCmdBtn(id) {
const btn=config.command_buttons.find(b=>b.id===id);
if(!btn) return;
const out=document.getElementById('cmd-out-'+id);
if(out) out.textContent='执行中...';
try {
const res=await api('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:btn.command,timeout:30})});
if(!out) return;
if(res.error) out.textContent='[错误] '+res.error+'\n'+(res.output||'');
else out.textContent=res.output||'(无输出)';
}catch(e){if(out)out.textContent='请求失败: '+e.message;}
}

function runAllCommands() {
if(!config?.command_buttons?.length) return;
config.command_buttons.forEach(btn=>runCmdBtn(btn.id));
}

function openCmdEditor(id) {
const btn=id?config.command_buttons.find(b=>b.id===id):null;
const html=
'<input type="hidden" id="cmd-edit-id" value="'+(btn?btn.id:'')+'">'+
'<div class="form-row"><div class="form-group"><label>标签</label><input type="text" id="cmd-edit-label" value="'+(btn?btn.label:'')+'"></div>'+
'<div class="form-group"><label>显示方式</label><select id="cmd-edit-display"><option value="output" '+(btn&&btn.display_type==='output'?'selected':'')+'>输出区域</option><option value="text" '+(btn&&btn.display_type==='text'?'selected':'')+'>文本显示</option></select></div></div>'+
'<div class="form-row"><div class="form-group"><label>自动刷新(s,0=手动)</label><input type="number" id="cmd-edit-refresh" value="'+(btn?btn.auto_refresh||0:0)+'" min="0"></div>'+
'<div class="form-group"><label>超时(s)</label><input type="number" id="cmd-edit-timeout" value="30" min="1"></div></div>'+
'<div class="form-group"><label>命令</label><textarea id="cmd-edit-command">'+(btn?btn.command:'')+'</textarea></div>'+
'<button class="btn btn-primary" onclick="saveCmdBtn()">保存</button>';
document.getElementById('cmd-editor-content').innerHTML=html;
document.getElementById('cmd-editor-modal').classList.add('active');
}

async function saveCmdBtn() {
const id=document.getElementById('cmd-edit-id').value;
const label=document.getElementById('cmd-edit-label').value;
const dt=document.getElementById('cmd-edit-display').value;
const ar=parseInt(document.getElementById('cmd-edit-refresh').value)||0;
const cmd=document.getElementById('cmd-edit-command').value;
if(!config.command_buttons) config.command_buttons=[];
const btn={id:id||'cmd_'+Date.now().toString(36),label,command:cmd,display_type:dt,auto_refresh:ar};
if(id){const idx=config.command_buttons.findIndex(b=>b.id===id);if(idx>=0)config.command_buttons[idx]=btn;}
else config.command_buttons.push(btn);
await saveConfig();
document.getElementById('cmd-editor-modal').classList.remove('active');
renderCommandTiles();
}

async function deleteCmdBtn(id) {
config.command_buttons=config.command_buttons.filter(b=>b.id!==id);
await saveConfig();
renderCommandTiles();
}

function editCmdBtn(id){openCmdEditor(id);}

function refreshHistorySelects() {
if(!config?.charts) return;
}

async function loadHistoryView() {
const since=new Date(document.getElementById('h-since').value).getTime();
const until=new Date(document.getElementById('h-until').value).getTime();
const container=document.getElementById('history-charts');
if(!config?.charts){container.innerHTML='<div class="empty-state">无图表</div>';return;}
const enabled=config.charts.filter(c=>c.enabled);
if(!enabled.length){container.innerHTML='<div class="empty-state">无启用图表</div>';return;}
container.innerHTML='<div class="empty-state">加载中...</div>';

let html='';
for(const chart of enabled) {
html+='<div class="history-chart-panel"><h3>'+chart.name+'</h3><div class="history-chart-wrapper"><canvas id="hchart-'+chart.id+'"></canvas></div></div>';
}
container.innerHTML=html;

for(const chart of enabled) {
const points=await api('/api/history?chart_id='+chart.id+'&since='+(since||0)+'&until='+(until||Date.now()));
setTimeout(()=>createHistoryChart(chart,points),50);
}
}

function createHistoryChart(chart,points) {
const canvas=document.getElementById('hchart-'+chart.id);
if(!canvas) return;
if(!points||!points.length) return;

const yAxes=makeYAxes(chart.data_sources);
const datasets=chart.data_sources.map((ds,i)=>({
label:ds.name,data:[],borderColor:ds.color||colors[i%colors.length],
backgroundColor:ds.color||colors[i%colors.length],fill:false,tension:0.2,pointRadius:1,
yAxisID:ds.y_axis_id||'y'
}));

chart.data_sources.forEach((ds,i)=>{
const data=[];
points.forEach(p=>{const v=p.values[ds.name];if(v!==undefined)data.push({x:p.timestamp,y:v});});
datasets[i].data=data;
});

new Chart(canvas,{type:'line',data:{datasets},options:{
responsive:true,maintainAspectRatio:false,animation:false,
plugins:{tooltip:{mode:'nearest',intersect:false},legend:{position:'bottom',labels:{boxWidth:8,font:{size:10},color:'#94a3b8'}}},
scales:{x:{type:'time',time:{displayFormats:{minute:'HH:mm',hour:'MM-dd HH:mm'}},ticks:{color:'#64748b',font:{size:9},maxTicksLimit:12},grid:{color:'#1e2d3d'}},...yAxes}
}});
}

function exportHistoryView() {
const since=new Date(document.getElementById('h-since').value).getTime();
const until=new Date(document.getElementById('h-until').value).getTime();
const base='/api/export';
if(since||until) {
const params=new URLSearchParams();
if(since)params.set('since',since);
if(until)params.set('until',until);
window.open('/api/export/all?'+params.toString(),'_blank');
} else {
window.open('/api/export/all','_blank');
}
}

async function clearHistory() {
if(!config?.charts) return;
if(!confirm('清理所有历史数据？不可撤销。')) return;
await api('/api/history/clear',{method:'DELETE'});
loadHistoryView();
}

loadConfig();
</script>
